  <!-- THEME BOOTSTRAP — applies the user's saved colour theme (blue / dark /
       light, chosen on the home page) before paint, on every full load.
       The theme palettes live in _theme-additions.scss [data-theme="…"]. -->
  <script>
    (function () {
      try {
        var t = window.localStorage.getItem('app-theme');
        if (t !== 'dark' && t !== 'light' && t !== 'blue') t = 'blue';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'blue');
      }
    })();
  </script>

   <!-- Custom Splash Screen Styles — HA glassmorphism, dark + purple/teal -->
  <style>
    /* Splash Screen - Home Assistant inspired glassmorphism */
    #custom-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse 700px 480px at 8% 0%,   rgba(167, 139, 250, 0.28) 0%, transparent 60%),
        radial-gradient(ellipse 600px 460px at 95% 100%, rgba(45, 212, 191, 0.24) 0%, transparent 60%),
        radial-gradient(ellipse 420px 320px at 50% 50%, rgba(99, 102, 241, 0.16) 0%, transparent 70%),
        #0a0e1a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
      font-family: 'Sora', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    /* Floating ambient orbs */
    #custom-splash::before,
    #custom-splash::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      animation: float 9s ease-in-out infinite;
    }
    #custom-splash::before {
      width: 380px; height: 380px;
      top: -120px; left: -120px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.45), transparent 70%);
    }
    #custom-splash::after {
      width: 320px; height: 320px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.40), transparent 70%);
      animation-delay: -4.5s;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
      padding: 36px 28px;
      border-radius: 28px;
      background: rgba(26, 31, 58, 0.42);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      border: 1px solid rgba(167, 139, 250, 0.22);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(45, 212, 191, 0.08) inset;
      max-width: min(420px, 86vw);
    }

    /* Company Logo Container */
    .splash-logo-container {
      margin-bottom: 24px;
    }

    .splash-logo {
      max-width: min(180px, 40vw);
      max-height: min(120px, 25vh);
      width: auto;
      height: auto;
      animation: gentlePulse 2.4s ease-in-out infinite;
      filter: drop-shadow(0 6px 22px rgba(167, 139, 250, 0.32));
    }

    /* Fallback Logo (if image fails to load) */
    .splash-logo-fallback {
      width: min(110px, 28vw);
      height: min(110px, 28vw);
      background: linear-gradient(135deg, #a78bfa 0%, #2dd4bf 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      box-shadow:
        0 12px 32px rgba(167, 139, 250, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.10) inset;
    }

    /* Welcome Message */
    .splash-welcome {
      color: #94a3c8;
      font-size: clamp(0.78rem, 3.4vw, 0.92rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .splash-company {
      color: #ffffff;
      font-size: clamp(1.4rem, 6.5vw, 2rem);
      font-weight: 700;
      margin-bottom: 28px;
      background: linear-gradient(135deg, #a78bfa 0%, #2dd4bf 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    /* Loading Indicator — purple/teal dual-ring */
    .custom-loader {
      position: relative;
      width: 64px;
      height: 64px;
      margin: 16px auto 6px;
    }

    .custom-loader-circle {
      width: 100%;
      height: 100%;
      border: 3px solid rgba(167, 139, 250, 0.18);
      border-top-color: #a78bfa;
      border-right-color: #c4b5fd;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .custom-loader-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 42px;
      height: 42px;
      border: 2px solid rgba(45, 212, 191, 0.18);
      border-bottom-color: #2dd4bf;
      border-left-color: #5eead4;
      border-radius: 50%;
      animation: spin 0.6s linear infinite reverse;
    }

    .loading-text {
      color: #94a3c8;
      font-size: clamp(0.78rem, 3.2vw, 0.88rem);
      margin-top: 22px;
      letter-spacing: 1.2px;
      font-weight: 500;
    }

    .loading-dots {
      display: inline-block;
      width: 20px;
      text-align: left;
      color: #2dd4bf;
    }

    /* Progress Bar — purple → teal gradient */
    .loading-progress {
      width: min(260px, 64vw);
      height: 4px;
      background: rgba(167, 139, 250, 0.16);
      border-radius: 4px;
      margin: 22px auto 0;
      overflow: hidden;
      position: relative;
    }

    .loading-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #a78bfa 0%, #2dd4bf 100%);
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(45, 212, 191, 0.55);
      animation: progressSimulation 2.5s ease-out forwards;
    }

    /* Animations */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(28px, 36px) scale(1.06); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gentlePulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.03);
        opacity: 0.94;
      }
    }

    @keyframes progressSimulation {
      0% { width: 0%; }
      20% { width: 18%; }
      50% { width: 48%; }
      80% { width: 78%; }
      100% { width: 96%; }
    }

    /* Hide splash screen */
    .splash-hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .custom-loader { width: 50px; height: 50px; }
      .custom-loader-inner { width: 32px; height: 32px; }
      .splash-content { padding: 28px 22px; }
    }
  </style>

<body>

  <!-- Custom Splash Screen (replaces default loader) -->
  <div id="custom-splash">
    <div class="splash-content">
      <!-- Company Logo Area -->
      <div class="splash-logo-container">
        <!-- Try to load your company logo - REPLACE THIS PATH -->
        <img src="./app/template/assets/img/digitalcom.png" 
             alt="Company Logo" 
             class="splash-logo"
             onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<div class=\'splash-logo-fallback\'><span>🏢</span></div>';">
      </div>
      
      <!-- Welcome Messages -->
      <div class="splash-welcome">WELCOME TO</div>
      <div class="splash-company">DigitalCom</div>
      
      <!-- Enhanced Loading Indicator -->
      <div class="custom-loader">
        <div class="custom-loader-circle"></div>
        <div class="custom-loader-inner"></div>
      </div>
      
      <div class="loading-text">
        Initializing Smart AC System<span class="loading-dots">...</span>
      </div>
      
      <!-- Optional Progress Bar -->
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      // Get splash screen element
      const splash = document.getElementById('custom-splash');
      
      // Animated loading text
      const loadingTextEl = document.querySelector('.loading-text');
      const dotsEl = document.querySelector('.loading-dots');
      let dotCount = 0;
      
      // Animate loading dots
      if (dotsEl) {
        setInterval(function() {
          if (splash && splash.style.visibility !== 'hidden') {
            dotCount = (dotCount % 3) + 1;
            dotsEl.textContent = '.'.repeat(dotCount);
          }
        }, 500);
      }
      
      // Function to hide splash screen
      function hideSplash() {
        if (splash) {
          splash.classList.add('splash-hidden');
          // Remove splash from DOM after animation
          setTimeout(function() {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 600);
        }
      }
      
      // Hide splash when CH5 is ready
      if (window.CH5) {
        // CH5 already loaded
        setTimeout(hideSplash, 1000);
      } else {
        // Wait for CH5 to initialize
        document.addEventListener('ch5-ready', hideSplash);
        
        // Fallback: hide after maximum 4 seconds
        setTimeout(hideSplash, 4000);
      }
      
      // Also hide when all assets are loaded
      window.addEventListener('load', function() {
        setTimeout(hideSplash, 500);
      });
      
      // Optional: Update loading text based on progress
      // You can call this from your Angular components
      window.updateSplashMessage = function(message) {
        if (loadingTextEl && splash && splash.style.visibility !== 'hidden') {
          const textSpan = loadingTextEl.childNodes[0];
          if (textSpan && textSpan.nodeType === Node.TEXT_NODE) {
            textSpan.textContent = message || 'Initializing Smart AC System';
          }
        }
      };
    })();
  </script>
